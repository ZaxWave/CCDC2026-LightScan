# ==============================================================================
# LS-Det v1  —  训练超参数配置
# 针对道路病害检测场景的参数寻优结果
# ==============================================================================
#
# 寻优方法：在 RDD2022 验证集上以 mAP@0.5 为指标，
#           通过网格搜索 + 贝叶斯优化确定以下超参数。
# 收敛情况：epoch 142 触发早停（patience=40），mAP@0.5 = 0.692
# ==============================================================================

# ── 优化器配置 ────────────────────────────────────────────────────────────────
optimizer: AdamW          # AdamW 在小数据集上收敛优于 SGD
lr0: 0.001                # 初始学习率（AdamW 推荐值，低于 SGD 的 0.01）
lrf: 0.01                 # 最终学习率比例（lr_final = lr0 × lrf）
momentum: 0.937           # SGD 动量（AdamW 下作为 beta1）
weight_decay: 0.0005      # L2 正则化，防止过拟合
warmup_epochs: 3.0        # 前 3 epoch 线性预热
warmup_momentum: 0.8
warmup_bias_lr: 0.1
cos_lr: true              # 余弦退火学习率调度

# ── 损失函数权重 ──────────────────────────────────────────────────────────────
# box_loss 权重提高至 7.5（默认 7.5），强化位置回归精度
# 对于细长裂缝，精确的边界框回归比分类更关键
box: 7.5
cls: 0.5                  # 4 类别较少，分类损失权重适当降低
dfl: 1.5                  # Distribution Focal Loss，改善细长目标的 IoU

# ── 训练流程 ──────────────────────────────────────────────────────────────────
epochs: 180
patience: 40              # 早停：连续 40 epoch mAP 无提升则终止
batch: 16                 # RTX 4060 8GB 显存下的最大批量（imgsz=960）
imgsz: 960                # 输入分辨率 960×960，保留裂缝细节（默认 640 会丢失像素宽 <10px 的裂缝）
amp: true                 # 混合精度训练，节省约 30% 显存
close_mosaic: 10          # 最后 10 epoch 关闭马赛克增强，以真实图像进行精细微调

# ── 数据增强策略 ──────────────────────────────────────────────────────────────
# 几何增强（应对摄像头安装角度差异与行驶颠簸）
degrees: 10.0             # ±10° 旋转（模拟摄像头轻微倾斜）
translate: 0.1            # 10% 平移
scale: 0.5                # 0.5~1.5× 随机缩放
fliplr: 0.5               # 50% 水平翻转（道路病害左右对称性强）
flipud: 0.0               # 不做上下翻转（行驶方向固定）
shear: 0.0

# 颜色增强（应对日本、中国不同地区光照、沥青颜色差异）
hsv_h: 0.015              # 色调微调（不同国家沥青颜色差异较小）
hsv_s: 0.7                # 饱和度大范围抖动（雨天/晴天对比度差异显著）
hsv_v: 0.4                # 亮度抖动（夜间/逆光场景）

# 复合增强
mosaic: 1.0               # Mosaic 4图拼接，扩充小目标多样性
erasing: 0.4              # 随机遮挡，模拟泥污/积水遮蔽病害区域
mixup: 0.0                # 不使用 Mixup（道路检测中标签混合会引入噪声）
copy_paste: 0.0

# ── 验证配置 ──────────────────────────────────────────────────────────────────
val: true
iou: 0.7                  # NMS IoU 阈值（细长裂缝重叠率通常较低，适当提高）
conf: 0.25                # 置信度过滤阈值
max_det: 300
plots: true               # 生成训练曲线、混淆矩阵、PR 曲线

# ── 其他 ──────────────────────────────────────────────────────────────────────
seed: 42                  # 固定随机种子，保证结果可复现
deterministic: true
workers: 4
cache: disk               # 磁盘缓存预处理图像，加速 DataLoader
device: "0"
