# ==============================================================================
# LightScan Road Defect Detection - Training Configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 基础任务配置
# ------------------------------------------------------------------------------
task: detect
mode: train
model: /root/models/lsdet_arch.yaml   # LS-Det v1 自定义网络结构
data: /root/datasets/road_defect.yaml
project: /root/runs/train
name: lsdet_v1
save: true
device: '0'
workers: 4
cache: disk
batch: 16
imgsz: 960

# ------------------------------------------------------------------------------
# 2. 训练超参数
# ------------------------------------------------------------------------------
epochs: 180
patience: 40
optimizer: auto
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
cos_lr: true
close_mosaic: 10
amp: true
deterministic: true

# 损失函数权重
box: 7.5
cls: 0.5
dfl: 1.5

# ------------------------------------------------------------------------------
# 3. 数据增强策略
# ------------------------------------------------------------------------------
# 几何变换
degrees: 10.0
translate: 0.1
scale: 0.5
fliplr: 0.5

# 混合增强
mosaic: 1.0
erasing: 0.4

# 颜色变换
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4

# ------------------------------------------------------------------------------
# 4. 验证与评价
# ------------------------------------------------------------------------------
val: true
split: val
iou: 0.7
max_det: 300
plots: true

# ------------------------------------------------------------------------------
# 5. 其他配置
# ------------------------------------------------------------------------------
save_period: -1
exist_ok: false
pretrained: true
verbose: true
seed: 0
single_cls: false
rect: false
resume: false
fraction: 1.0
profile: false
freeze: null
multi_scale: 0.0
compile: false
overlap_mask: true
mask_ratio: 4
dropout: 0.0
save_json: false
conf: null
half: false
dnn: false
end2end: null
source: null
vid_stride: 1
stream_buffer: false
visualize: false
augment: false
agnostic_nms: false
classes: null
retina_masks: false
embed: null
show: false
save_frames: false
save_txt: false
save_conf: false
save_crop: false
show_labels: true
show_conf: true
show_boxes: true
line_width: null
format: torchscript
keras: false
optimize: false
int8: false
dynamic: false
simplify: true
opset: null
workspace: null
nms: false
warmup_momentum: 0.8
warmup_bias_lr: 0.1
cls_pw: 0.0
pose: 12.0
kobj: 1.0
rle: 1.0
angle: 1.0
nbs: 64
shear: 0.0
perspective: 0.0
flipud: 0.0
bgr: 0.0
mixup: 0.0
cutmix: 0.0
copy_paste: 0.0
copy_paste_mode: flip
auto_augment: randaugment
cfg: null
tracker: botsort.yaml
time: null
save_dir: /root/runs/train/lsdet_v1
